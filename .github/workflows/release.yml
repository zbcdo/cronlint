name: release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1; Node 22 bundles npm 10.x
      - run: npm install -g npm@latest

      - name: verify tag matches package version
        run: |
          pkg="v$(npm pkg get version | tr -d '"')"
          if [ "$pkg" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME != package version $pkg"
            exit 1
          fi

      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm publish